<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>CRUD Produk</title>
<style>
body{font-family:sans-serif;max-width:520px;margin:30px auto}
input,textarea,button,select{width:100%;margin:6px 0;padding:8px}
pre{background:#111;color:#0f0;padding:10px}
</style>
</head>
<body>

<h3>CRUD Produk</h3>

<select id="list" onchange="loadItem()"></select>

<input id="id" placeholder="ID (kurma204)">
<input id="img" placeholder="URL Gambar">
<input id="title" placeholder="Judul">
<textarea id="desc" placeholder="Deskripsi"></textarea>
<input id="price" placeholder="Harga">
<input id="promo" placeholder="Promo">
<input id="save" placeholder="Hemat">
<input id="wa" placeholder="WhatsApp">

<button onclick="save()">Simpan / Update</button>
<button onclick="remove()">Hapus</button>
<button onclick="exportJSON()">Export JSON</button>

<pre id="out"></pre>

<script>
const KEY = 'db';

const getDB = () => JSON.parse(localStorage.getItem(KEY) || '{}');
const setDB = d => localStorage.setItem(KEY, JSON.stringify(d));

function refresh() {
  const db = getDB();
  list.innerHTML = '<option value="">-- pilih --</option>';
  Object.keys(db).forEach(k => {
    const o = document.createElement('option');
    o.value = k; o.textContent = k;
    list.appendChild(o);
  });
}

function loadItem() {
  const d = getDB()[list.value];
  if (!d) return;
  id.value = list.value;
  img.value = d.img;
  title.value = d.title;
  desc.value = d.desc;
  price.value = d.price;
  promo.value = d.promo;
  save.value = d.save;
  wa.value = d.wa;
}

function save() {
  const db = getDB();
  db[id.value] = {
    img: img.value,
    title: title.value,
    desc: desc.value,
    price: price.value,
    promo: promo.value,
    save: save.value,
    wa: wa.value
  };
  setDB(db);
  refresh();
}

function remove() {
  const db = getDB();
  delete db[id.value];
  setDB(db);
  refresh();
}

function exportJSON() {
  out.textContent = JSON.stringify(getDB(), null, 2);
}

refresh();
</script>
</body>
</html>
