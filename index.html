<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Katalog Produk</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">

    <div class="max-w-5xl mx-auto px-4 py-10">
        <!-- Header -->
        <div class="mb-10 text-center">
            <h1 class="text-3xl font-bold text-indigo-600">Product Manager</h1>
            <p class="text-gray-500 mt-2">Kelola database produk Anda dengan mudah</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Form Section -->
            <div class="lg:col-span-5">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sticky top-8">
                    <h2 class="text-lg font-semibold mb-5 flex items-center">
                        <span class="w-2 h-6 bg-indigo-500 rounded-full mr-3"></span>
                        Editor Produk
                    </h2>

                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Pilih Produk (Edit)</label>
                            <select id="list" onchange="loadItem()" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all">
                                <option value="">-- Buat Produk Baru --</option>
                            </select>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">ID Produk</label>
                                <input id="id" placeholder="Contoh: krm01" class="w-full border border-gray-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">WhatsApp</label>
                                <input id="wa" placeholder="62812..." class="w-full border border-gray-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Judul Produk</label>
                            <input id="title" placeholder="Nama Barang" class="w-full border border-gray-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">URL Gambar</label>
                            <input id="img" placeholder="https://..." class="w-full border border-gray-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        </div>

                        <div>
                            <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Deskripsi</label>
                            <textarea id="desc" rows="3" placeholder="Detail produk..." class="w-full border border-gray-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none"></textarea>
                        </div>

                        <div class="grid grid-cols-3 gap-3">
                            <div>
                                <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Harga</label>
                                <input id="price" placeholder="150000" class="w-full border border-gray-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Promo</label>
                                <input id="promo" placeholder="125000" class="w-full border border-gray-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-500 uppercase tracking-wider mb-1">Hemat</label>
                                <input id="save" placeholder="25k" class="w-full border border-gray-200 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                            </div>
                        </div>

                        <div class="pt-4 space-y-2">
                            <button onclick="save()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg transition-colors shadow-lg shadow-indigo-100">
                                Simpan / Update Produk
                            </button>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="remove()" class="bg-white border border-red-200 text-red-600 hover:bg-red-50 py-2 rounded-lg transition-colors font-medium">
                                    Hapus
                                </button>
                                <button onclick="exportJSON()" class="bg-gray-100 hover:bg-gray-200 text-gray-700 py-2 rounded-lg transition-colors font-medium">
                                    Export JSON
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Preview & Export Section -->
            <div class="lg:col-span-7 space-y-6">
                <!-- Preview Title -->
                <div class="flex items-center justify-between mb-2">
                    <h2 class="text-lg font-semibold text-gray-700">Data Output</h2>
                    <span id="status" class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded">Aktif</span>
                </div>

                <!-- Export View -->
                <div class="bg-slate-900 rounded-2xl p-4 overflow-hidden shadow-xl">
                    <div class="flex items-center justify-between mb-3 px-2">
                        <div class="flex space-x-1.5">
                            <div class="w-3 h-3 rounded-full bg-red-500"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-500"></div>
                            <div class="w-3 h-3 rounded-full bg-green-500"></div>
                        </div>
                        <span class="text-gray-500 text-xs font-mono">database.json</span>
                    </div>
                    <pre id="out" class="text-emerald-400 font-mono text-sm overflow-auto max-h-[500px] custom-scrollbar">{}</pre>
                </div>

                <!-- Info Card -->
                <div class="bg-indigo-50 border border-indigo-100 rounded-2xl p-5 flex items-start space-x-4">
                    <div class="bg-indigo-100 p-2 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="id13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                        </svg>
                    </div>
                    <div>
                        <h4 class="font-semibold text-indigo-900 text-sm">Tips Penyimpanan</h4>
                        <p class="text-indigo-700 text-xs mt-1 leading-relaxed">
                            Data disimpan di browser lokal Anda. Gunakan fitur "Export JSON" untuk menyalin data mentah guna keperluan integrasi website katalog Anda.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const KEY = 'db_produk_modern';
        const fields = ['id', 'img', 'title', 'desc', 'price', 'promo', 'save', 'wa'];

        const getDB = () => JSON.parse(localStorage.getItem(KEY) || '{}');
        const setDB = d => {
            localStorage.setItem(KEY, JSON.stringify(d));
            exportJSON(); // Auto update output view
        };

        function refresh() {
            const db = getDB();
            const listEl = document.getElementById('list');
            listEl.innerHTML = '<option value="">-- Buat Produk Baru --</option>';
            
            Object.keys(db).sort().forEach(k => {
                const o = document.createElement('option');
                o.value = k;
                o.textContent = `${k} - ${db[k].title || 'Tanpa Judul'}`;
                listEl.appendChild(o);
            });
        }

        function loadItem() {
            const listEl = document.getElementById('list');
            const d = getDB()[listEl.value];
            
            if (!d) {
                fields.forEach(f => document.getElementById(f).value = '');
                return;
            }

            document.getElementById('id').value = listEl.value;
            fields.slice(1).forEach(f => {
                document.getElementById(f).value = d[f] || '';
            });
        }

        function save() {
            const idVal = document.getElementById('id').value.trim();
            if(!idVal) {
                showToast('ID Produk wajib diisi', 'error');
                return;
            }

            const db = getDB();
            db[idVal] = {};
            fields.slice(1).forEach(f => {
                db[idVal][f] = document.getElementById(f).value;
            });

            setDB(db);
            refresh();
            document.getElementById('list').value = idVal;
            showToast('Produk berhasil disimpan!');
        }

        function remove() {
            const idVal = document.getElementById('id').value.trim();
            if(!idVal || !confirm('Hapus produk ini?')) return;

            const db = getDB();
            delete db[idVal];
            setDB(db);
            refresh();
            loadItem();
            showToast('Produk dihapus', 'info');
        }

        function exportJSON() {
            const out = document.getElementById('out');
            out.textContent = JSON.stringify(getDB(), null, 4);
        }

        function showToast(msg, type = 'success') {
            const status = document.getElementById('status');
            status.textContent = msg;
            status.className = `text-xs px-2 py-1 rounded ${type === 'success' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`;
            setTimeout(() => {
                status.textContent = 'Aktif';
                status.className = 'text-xs bg-green-100 text-green-700 px-2 py-1 rounded';
            }, 3000);
        }

        // Init
        refresh();
        exportJSON();
    </script>
</body>
</html>
